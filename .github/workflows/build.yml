name: C++ Transformer CI

# Trigger the action every time you push to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your code into the Ubuntu server
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install the NVIDIA CUDA Toolkit (Provides nvcc and cuBLAS)
    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.17
      id: cuda-toolkit
      with:
        cuda: '12.2.0' # A highly stable compiler version

    # 3. Verify the compiler is active
    - name: Verify NVCC
      run: nvcc --version

    # 4. The Master Compilation Command
    - name: Compile Transformer Engine
      run: |
        nvcc -O3 main.cu src/core/*.cu src/model/*.cu src/layers/*.cu src/data/*.cpp -lcublas -o gpt_engine

    # 5. Verify the binary was successfully created
    - name: Verify Build Artifact
      run: |
        if [ -f "./gpt_engine" ]; then
            echo "SUCCESS: gpt_engine binary compiled flawlessly."
        else
            echo "FATAL: Binary not found."
            exit 1
        fi